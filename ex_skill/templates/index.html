<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前任 Skill - AI 数字人格</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .feature-list {
            text-align: left;
            margin: 30px 0;
        }
        .feature-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .feature-item:last-child { border-bottom: none; }
        .feature-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            margin-right: 20px;
            flex-shrink: 0;
        }
        .feature-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .feature-desc {
            color: #666;
            font-size: 0.9rem;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💔 前任 Skill</h1>
        <p class="subtitle">将回忆转化为永恒，与过去温柔重逢</p>
        
        <div class="card">
            <h2 style="color: #333; margin-bottom: 20px;">核心功能</h2>
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">👤</div>
                    <div>
                        <div class="feature-title">数字人格生成</div>
                        <div class="feature-desc">通过聊天记录、照片、性格标签，创建独一无二的 AI 分身</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💬</div>
                    <div>
                        <div class="feature-title">情绪与性格模拟</div>
                        <div class="feature-desc">支持撒娇、高冷、黏人等多种恋爱性格，真实还原相处模式</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📖</div>
                    <div>
                        <div class="feature-title">回忆与对话模式</div>
                        <div class="feature-desc">基于记忆库生成对话，沉浸式互动体验</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div>
            <a href="/create" class="btn btn-primary">创建数字人格</a>
            <a href="/personas" class="btn btn-secondary">我的列表</a>
        </div>
    </div>
</body>
</html>
